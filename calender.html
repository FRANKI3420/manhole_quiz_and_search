<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>取得カレンダー - マンホール図鑑</title>
    <style>
        :root {
            --bg: #1a1a1a;
            --card-bg: #2a2a2a;
            --accent: #4dabff;
            --text: #eee;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            margin: 0;
            padding: 15px;
        }

        .nav {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            background: #444;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 14px;
        }

        /* カレンダー本体のスタイル */
        .calendar-container {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
        }

        .day-label {
            font-size: 12px;
            color: #888;
            padding-bottom: 5px;
        }

        .day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            position: relative;
            transition: 0.2s;
        }

        .day:hover {
            background: #444;
        }

        /* 記録がある日の強調 */
        .has-record {
            border: 2px solid var(--accent);
            font-weight: bold;
            color: var(--accent);
        }

        .selected-day {
            background: var(--accent) !important;
            color: white !important;
        }

        /* 下部に並ぶカードリスト */
        #resultArea {
            margin-top: 25px;
        }

        .result-title {
            font-size: 16px;
            border-left: 4px solid var(--accent);
            padding-left: 10px;
            margin-bottom: 15px;
            color: var(--accent);
        }

        .card-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
        }

        /* カードの見切れを防止 */
        .card-mini img {
            width: 100%;
            aspect-ratio: 2/3;
            /* マンホールカードの比率に合わせる */
            object-fit: contain;
            /* 全体が入るように調整 */
            background: #000;
        }

        /* モーダルのスタイル（index.htmlから移植） */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        /* モーダルの箱：少し縦に余裕を持たせる */
        /* モーダルの箱を調整 */
        .modal-content {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            max-height: 90vh;
            /* 画面の高さの90%までに制限 */
            overflow-y: auto;
            /* 縦にはみ出したらスクロールさせる */
            text-align: center;
            position: relative;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            /* 中身を縦に並べる */
        }

        /* 画像のサイズを少し抑える */
        #modalImg {
            width: 100%;
            max-height: 40vh;
            /* 画像は画面の40%まで */
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        #modalActionArea {
            width: 100%;
            padding-top: 10px;
        }

        /* ×ボタン：画像に被らないよう、絶対配置で右上に固定 */
        .close-btn {
            position: absolute;
            top: 0px;
            /* 上端からの距離 */
            right: 10px;
            /* 右端からの距離 */
            font-size: 28px;
            cursor: pointer;
            color: #bbb;
            z-index: 1010;
            /* 画像より上に表示 */
            padding: 5px;
            color: red;
            /* タップしやすくする */
        }

        /* 画像：ボタンに被らないようマージンを調整 */
        #modalImg {
            width: 100%;
            max-height: 60vh;
            /* スマホで画面からはみ出さないよう高さを制限 */
            object-fit: contain;
            border-radius: 10px;
            margin-top: 10px;
            /* ボタンとの間に隙間を作る */
            margin-bottom: 15px;
        }

        /* カード全体の枠組みをスリムに */
        .card-mini {
            background: var(--card-bg);
            border-radius: 6px;
            /* 少し角を丸める */
            overflow: hidden;
            border: 1px solid #444;
            display: flex;
            flex-direction: column;
        }

        /* カードリストのグリッドを少し余裕のあるサイズに */
        .card-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            /* 85pxから90pxへ微増 */
            gap: 10px;
        }

        /* 文字エリアの設定 */
        .card-mini-info {
            padding: 6px 4px;
            /* 上下に少し余裕を持たせる */
            background: #222;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* 中央寄せ */
            min-height: 20px;
            /* 高さを確保してガタつきを抑える */
        }

        /* 都市名のテキストスタイル */
        .card-mini-info div {
            font-size: 11px;
            /* 10pxから11pxへ。視認性を確保 */
            line-height: 1.3;
            text-align: center;
            /* 文字自体を中央寄せ */
            width: 100%;
            /* 幅いっぱい使って中央判定を安定させる */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #eee;
            /* 少しだけ明るくして読みやすく */
            font-weight: 500;
            /* 細すぎず太すぎない中間の太さ */
        }

        /* 枚数に応じた色の変化（ヒートマップ風） */
        .day.level-1 {
            background: rgba(77, 171, 255, 0.3);
            border: 1px solid var(--accent);
        }

        .day.level-2 {
            background: rgba(77, 171, 255, 0.6);
            border: 1px solid var(--accent);
            color: #fff;
        }

        .day.level-3 {
            background: rgba(77, 171, 255, 1.0);
            border: 1px solid var(--accent);
            color: #fff;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(77, 171, 255, 0.5);
        }

        /* 月間合計の表示スタイル */
        .monthly-stats {
            text-align: right;
            font-size: 13px;
            color: #888;
            margin: -10px 5px 10px 0;
        }

        .monthly-stats b {
            color: var(--accent);
            font-size: 16px;
        }

        /* 編集・保存ボタンのスタイル */
        .edit-btn,
        .search-btn {
            margin-top: 15px;
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: 0.3s;
            width: 100%;
            /* スマホで見やすいよう幅いっぱい */
            display: block;
        }

        .edit-btn {
            background: var(--accent);
            color: white;
        }

        .search-btn {
            background: #444;
            color: #eee;
            text-decoration: none;
            text-align: center;
            margin-top: 10px;
        }

        .edit-btn:hover,
        .search-btn:hover {
            opacity: 0.8;
        }

        /* メモ入力エリア */
        #modalMemo {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #444;
            min-height: 80px;
            font-family: inherit;
            resize: none;
            /* 自由に広げられないように固定 */
        }
    </style>
</head>

<body>

    <div class="nav">
        <a href="collection.html" class="back-btn">← 図鑑に戻る</a>
        <a href="stats.html" class="back-btn">統計 →</a>
        <!-- <div id="currentMonthDisplay" style="font-weight: bold;">2024年 1月</div> -->
    </div>

    <div class="calendar-container">
        <div class="cal-header">
            <button onclick="changeMonth(-1)"
                style="background:none; border:none; color:white; cursor:pointer; padding:10px;">◀</button>

            <div style="display: flex; gap: 5px; align-items: center;">
                <select id="yearSelect" onchange="jumpToDate()"
                    style="background:#333; color:white; border:1px solid #555; border-radius:4px; padding:2px 5px;"></select>
                <span>年</span>
                <select id="monthSelect" onchange="jumpToDate()"
                    style="background:#333; color:white; border:1px solid #555; border-radius:4px; padding:2px 5px;"></select>
                <span>月</span>
            </div>

            <button onclick="changeMonth(1)"
                style="background:none; border:none; color:white; cursor:pointer; padding:10px;">▶</button>
        </div>

        <div id="monthlyTotal" class="monthly-stats"></div>
        <div class="cal-grid" id="calendarGrid"></div>
    </div>

    <div id="resultArea">
        <div id="prefStatsArea" style="margin: 10px 0 20px; display: none;">
            <div style="font-size: 12px; color: #888; margin-bottom: 8px;">この月の都道府県別内訳:</div>
            <div id="prefBadgeList" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
        </div>
        <div id="selectedDateTitle" class="result-title">日付を選択してください</div>

        <div id="cardList" class="card-list"></div>
    </div>
    <div id="modal" class="modal-overlay" onclick="if(event.target==this)closeModal()">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <img id="modalImg" src="" alt="">
            <h3 id="modalTitle" style="margin:10px 0 5px;"></h3>
            <p id="modalSub" style="color:#888; font-size:12px; margin-bottom:15px;"></p>

            <div id="modalMainContent"></div>

            <div id="modalDate" style="margin-top:10px; font-size:12px; color:var(--accent);"></div>
        </div>
    </div>

    <script>
        let masterData = [];
        let userStats = JSON.parse(localStorage.getItem('manhole_collection')) || {};
        let currentDisplayDate = new Date();
        let currentYear, currentMonth;

        // 初期読み込み
        async function init() {
            try {
                console.log("JSON読み込み開始...");
                const res = await fetch('master_data.json');

                if (!res.ok) {
                    throw new Error(`HTTPエラー! ステータス: ${res.status}`);
                }

                masterData = await res.json();
                console.log("JSON読み込み成功:", masterData.length, "件");

                // --- ここからURLパラメータの解析を追加 ---
                const urlParams = new URLSearchParams(window.location.search);
                const targetParam = urlParams.get('target'); // "2024-05" などの形式

                if (targetParam && targetParam.includes('-')) {
                    const [tYear, tMonth] = targetParam.split('-');
                    currentYear = parseInt(tYear);
                    currentMonth = parseInt(tMonth) - 1; // JSの月は0-11のため
                    console.log(`表示月を切り替えました: ${currentYear}年${currentMonth + 1}月`);
                } else {
                    // パラメータがない場合は「今日」を表示
                    const now = new Date();
                    currentYear = now.getFullYear();
                    currentMonth = now.getMonth();
                }
                // --- 解析ここまで ---

                renderCalendar();
                // もし図鑑統計関数（updatePrefStats）がある場合はここで呼ぶ
                if (typeof updatePrefStats === 'function') updatePrefStats();

            } catch (e) {
                console.error("エラー詳細:", e);
            }
        }
        // ページ読み込み完了後に実行
        window.onload = init;

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const totalDisplay = document.getElementById('monthlyTotal');
            const yearSelect = document.getElementById('yearSelect');
            const monthSelect = document.getElementById('monthSelect');

            if (!grid || !yearSelect || !monthSelect) return;

            grid.innerHTML = '';

            const year = currentYear;
            const month = currentMonth;

            // --- 年セレクトボックスの生成 (2020年から現在の5年後まで) ---
            yearSelect.innerHTML = '';
            for (let y = 2020; y <= new Date().getFullYear() + 5; y++) {
                const opt = document.createElement('option');
                opt.value = y;
                opt.textContent = y;
                if (y === year) opt.selected = true;
                yearSelect.appendChild(opt);
            }

            // --- 月セレクトボックスの生成 ---
            monthSelect.innerHTML = '';
            for (let m = 0; m < 12; m++) {
                const opt = document.createElement('option');
                opt.value = m;
                opt.textContent = m + 1;
                if (m === month) opt.selected = true;
                monthSelect.appendChild(opt);
            }

            // 曜日ラベル
            ['日', '月', '火', '水', '木', '金', '土'].forEach(d => {
                grid.innerHTML += `<div class="day-label">${d}</div>`;
            });

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();

            // 空白埋め
            for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;

            // --- 都道府県集計用のロジック ---
            let monthTotalCount = 0;
            let monthlyPrefs = {};

            // userStats の全データを [キー, 値] の配列にしてループ
            const userStatsEntries = Object.entries(userStats);

            for (let date = 1; date <= lastDate; date++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(date).padStart(2, '0')}`;

                // その日の記録を「キー」を含めて抽出
                const dayEntries = userStatsEntries.filter(([key, stat]) =>
                    stat.collected && stat.date === dateStr
                );

                dayEntries.forEach(([key, stat]) => {
                    // key には "千代田区 (13-101-A001)" などが入っているはず
                    const card = masterData.find(c => {
                        const fullKey = `${c.city} (${c.id})`;
                        // キー名(key) または 保存されたid(stat.id) で比較
                        return key === fullKey || key === c.city || stat.id === fullKey;
                    });

                    if (card && card.pref) {
                        monthlyPrefs[card.pref] = (monthlyPrefs[card.pref] || 0) + 1;
                    } else {
                        console.warn("マッチ失敗。キー:", key, " stat.id:", stat.id);
                    }
                });

                const count = dayEntries.length;
                monthTotalCount += dayEntries.length;

                let levelClass = '';
                if (count >= 6) levelClass = 'level-3';
                else if (count >= 3) levelClass = 'level-2';
                else if (count >= 1) levelClass = 'level-1';

                const dayEl = document.createElement('div');
                dayEl.className = `day ${levelClass}`;
                dayEl.textContent = date;
                dayEl.onclick = () => showCardsForDate(dateStr, dayEl);
                grid.appendChild(dayEl);
            }

            totalDisplay.innerHTML = `今月の取得数: <b>${monthTotalCount}</b> 枚`;
            renderPrefStats(monthlyPrefs);
        }

        // ★追加：バッジを描画する関数
        function renderPrefStats(stats) {
            const area = document.getElementById('prefStatsArea');
            const list = document.getElementById('prefBadgeList');

            if (Object.keys(stats).length === 0) {
                area.style.display = 'none';
                return;
            }

            area.style.display = 'block';
            list.innerHTML = '';

            // 枚数が多い順に並び替え
            const sortedPrefs = Object.entries(stats).sort((a, b) => b[1] - a[1]);

            sortedPrefs.forEach(([pref, count]) => {
                const badge = document.createElement('div');
                badge.style.cssText = `
            background: #333;
            border: 1px solid #555;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 12px;
            color: #eee;
            display: flex;
            align-items: center;
            gap: 5px;
        `;
                badge.innerHTML = `${pref} <b style="color:var(--accent)">${count}</b>`;
                list.appendChild(badge);
            });
        }

        function jumpToDate() {
            const y = parseInt(document.getElementById('yearSelect').value);
            const m = parseInt(document.getElementById('monthSelect').value);

            // ★表示用の変数を更新
            currentYear = y;
            currentMonth = m;

            // 日付オブジェクトも同期させておく（スワイプ時にズレないように）
            currentDisplayDate = new Date(y, m, 1);

            renderCalendar();
        }
        function changeMonth(diff) {
            // 1. 日付オブジェクトを更新
            currentDisplayDate.setMonth(currentDisplayDate.getMonth() + diff);

            // 2. ★描画に使っている変数も一緒に更新する
            currentYear = currentDisplayDate.getFullYear();
            currentMonth = currentDisplayDate.getMonth();

            // 3. 再描画
            renderCalendar();
        }

        // （showCardsForDate 以下の関数は以前と同じなので省略せずそのまま使ってください）
        function showCardsForDate(dateStr, element) {
            document.querySelectorAll('.day').forEach(d => d.classList.remove('selected-day'));
            element.classList.add('selected-day');

            const title = document.getElementById('selectedDateTitle');
            const list = document.getElementById('cardList');
            list.innerHTML = '';

            const [y, m, d] = dateStr.split('-');
            title.textContent = `${y}年${m}月${d}日 の取得`;

            // 日付に一致するキーを取得
            const targetKeys = Object.keys(userStats).filter(key => {
                return userStats[key].collected && userStats[key].date === dateStr;
            });

            // masterDataからカードを特定
            const cardsOnThisDay = masterData.filter(card => {
                const fullKey = `${card.city} (${card.id})`;
                return targetKeys.some(tKey => tKey === fullKey || tKey.includes(card.city));
            });

            if (cardsOnThisDay.length === 0) {
                list.innerHTML = '<div class="empty-msg">記録はありません</div>';
                return;
            }

            // ★ ここで onclick="openDetail(...)" を含むHTMLを生成
            cardsOnThisDay.forEach(card => {
                const matchedKey = targetKeys.find(tKey => tKey.includes(card.city)) || "";

                list.innerHTML += `
            <div class="card-mini" onclick="openDetail('${card.id}', '${matchedKey}')" style="cursor:pointer;">
                <img src="${card.url}" alt="${card.city}">
                <div class="card-mini-info">
                    <div>${card.city}</div>
                </div>
            </div>
            `;
            });
        }

        // goToSearchPageが参照する変数をグローバル（関数の外）に用意
        let currentCity = "";

        function openDetail(cardId, matchedKey) {
            const card = masterData.find(c => c.id === cardId);
            const stat = userStats[matchedKey];
            if (!card || !stat) return;

            currentCity = card.city;

            // 基本情報
            document.getElementById('modalImg').src = card.url;
            document.getElementById('modalTitle').textContent = card.city;
            document.getElementById('modalSub').textContent = `${card.pref} / ${card.edition}`;
            document.getElementById('modalDate').textContent = `取得日: ${stat.date.replace(/-/g, '.')}`;

            // メモとボタンをまとめて生成（重なり防止）
            const mainContent = document.getElementById('modalMainContent');
            mainContent.innerHTML = `
        <div style="background:#1a1a1a; padding:10px; border-radius:8px; margin-bottom:15px;">
            <textarea id="editMemoInput" 
                style="width:100%; min-height:40px; background:transparent; color:#ddd; border:none; outline:none; font-size:14px; font-family:inherit; line-height:1.6; resize:none;"
                placeholder="思い出メモを入力...">${stat.memo || ""}</textarea>
        </div>

        <button class="edit-btn" onclick="saveMemo('${matchedKey}')" 
            style="width:100%; background:var(--accent); color:white; padding:10px; border:none; border-radius:6px; font-weight:bold; cursor:pointer; margin-bottom:20px;">
            メモを保存する
        </button>

        <div style="border-top: 1px solid #444; padding-top: 15px;">
            <button id="customSearchBtn" onclick="goToSearchPage()"
                style="width: 100%; background: #444; color: #fff; padding: 10px; font-size: 13px; border-radius: 6px; border: none; cursor: pointer; display: block;">
                🔍 画像で判定・検索
            </button>
        </div>
    `;

            document.getElementById('modal').style.display = 'flex';
        }

        // ご提示の関数をそのまま使用（またはスクリプト内に配置）
        function goToSearchPage() {
            if (!currentCity) return;
            const d = masterData.find(x => x.city === currentCity);
            if (!d || !d.url) return;
            // _blank（別タブ）で開く設定
            window.open(`search.html?img=${encodeURIComponent(d.url)}&city=${encodeURIComponent(d.city)}`, '_blank');
        }
        // メモを保存する関数
        function saveMemo(matchedKey) {
            const btn = event.target; // 押されたボタンを取得
            const newMemo = document.getElementById('editMemoInput').value;

            // ローカルストレージを更新
            if (!userStats[matchedKey]) userStats[matchedKey] = {};
            userStats[matchedKey].memo = newMemo;
            localStorage.setItem('manhole_collection', JSON.stringify(userStats));

            // 保存完了の視覚効果
            const originalText = btn.textContent;
            btn.textContent = "✅ 保存完了";
            btn.style.background = "#28a745"; // 緑色に

            setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = "var(--accent)"; // 元の色に
            }, 2000);
        }


        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // function changeMonth(diff) {
        //     currentDisplayDate.setMonth(currentDisplayDate.getMonth() + diff);
        //     renderCalendar();
        // }

        // スワイプ操作の初期化
        document.addEventListener('DOMContentLoaded', () => {
            // クラス名から要素を取得
            const calendarArea = document.querySelector('.calendar-container');

            if (calendarArea) {
                let startX, startY;

                // 指が触れた時
                calendarArea.addEventListener('touchstart', e => {
                    startX = e.touches[0].pageX;
                    startY = e.touches[0].pageY;
                }, { passive: true });

                // 指が離れた時
                calendarArea.addEventListener('touchend', e => {
                    let endX = e.changedTouches[0].pageX;
                    let endY = e.changedTouches[0].pageY;

                    let diffX = endX - startX;
                    let diffY = endY - startY;

                    if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 70) {
                        if (diffX > 0) {
                            // 右スワイプ（指を右へ）＝ 前の月へ
                            changeMonth(-1);
                        } else {
                            // 左スワイプ（指を左へ）＝ 次の月へ
                            changeMonth(1);
                        }
                    }
                }, { passive: true });
            }
        });
    </script>
