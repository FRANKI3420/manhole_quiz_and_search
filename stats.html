<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動統計 - マンホール図鑑</title>
    <style>
        :root {
            --bg: #1a1a1a;
            --card-bg: #2a2a2a;
            --accent: #4dabff;
            --text: #eee;
            --bar-bg: #111;
        }

        /* 全要素に適用：パディングによるサイズ膨張（見切れ）を防止 */
        * {
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            margin: 0;
            padding: 15px;
            line-height: 1.5;
        }

        /* ナビゲーション */
        .nav {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            background: #444;
            color: white;
            border: none;
            padding: 10px 18px;
            /* 少し大きく */
            border-radius: 6px;
            text-decoration: none;
            font-size: 15px;
            /* サイズアップ */
            font-weight: bold;
        }

        /* グラフ・コンテナ */
        .chart-container {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            overflow-x: auto;
            width: 100%;
            /* 見切れ防止 */
        }

        h2 {
            font-size: 20px;
            /* サイズアップ */
            color: var(--accent);
            margin: 0 0 15px 0;
        }

        /* 統計ボックス */
        .stats-summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: #333;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-box div {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 4px;
        }

        .stat-box b {
            font-size: 22px;
            /* 数字を強調 */
            color: var(--accent);
        }

        /* 地方・都道府県リストの親 */
        #prefStatsContainer {
            background: transparent;
            /* 重なりを防ぐため透過 */
            margin-top: 20px;
        }

        .stats-title {
            font-size: 16px;
            /* サイズアップ */
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 1. 地方コンテナ */
        .region-container {
            margin-bottom: 15px;
            border: 1px solid #444;
            border-radius: 10px;
            background: var(--card-bg);
            overflow: hidden;
            width: 100%;
        }

        /* 2. 地方ヘッダー */
        .region-header {
            background: #333;
            padding: 15px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .region-name-row {
            display: flex;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
            /* 地方名を見やすく */
            color: #fff;
        }

        .region-percentage-row {
            font-size: 13px;
            color: #ccc;
        }

        /* 3. プログレスバー（見切れ防止の要） */
        .region-gauge-bg,
        .bar-bg {
            background: var(--bar-bg);
            height: 10px;
            /* 少し太くして視認性アップ */
            border-radius: 5px;
            width: 100%;
            overflow: hidden;
            position: relative;
            /* 子要素の基準に */
        }

        .bar-fill {
            height: 100%;
            border-radius: 8px;
            transition: width 0.3s ease;
            background-color: #555 !important;
            /* デフォルトはグレー */
        }

        /* 4. 県別リスト（オープン時） */
        .region-content {
            display: none;
            padding: 20px 15px;
            background: #1e1e1e;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            border-top: 1px solid #444;
        }

        .region-container.open .region-content {
            display: grid !important;
        }

        /* 5. 各県のアイテム */
        .pref-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .pref-info {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            /* 県名を見やすく */
            color: #eee;
        }

        /* 6. 矢印 */
        .arrow {
            display: inline-block;
            transition: transform 0.3s;
            margin-right: 10px;
            font-size: 14px;
            color: var(--accent);
        }

        .region-container.open .arrow {
            transform: rotate(90deg);
        }

        /* 選択中の都道府県を強調 */
        .pref-item.active-filter {
            background: rgba(77, 171, 255, 0.2);
            border: 1px solid var(--accent);
            border-radius: 6px;
        }

        /* 日本地図のコンテナ */
        .map-container {
            max-width: 600px;
            margin: 20px auto;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
        }

        /* SVG内の各都道府県（path要素）の基本スタイル */
        .map-pref {
            fill: #333333;
            /* 初期状態（未取得）はダークグレー */
            stroke: #1e1e1e;
            /* 都道府県の境界線 */
            stroke-width: 1;
            transition: fill 0.3s ease, opacity 0.2s;
            cursor: pointer;
        }

        /* マウスを乗せたときに少し明るくする */
        .map-pref:hover {
            opacity: 0.8;
        }

        /* 都道府県名ポップアップ（簡易的なツールチップ表示用スタイル） */
        .map-container svg text {
            fill: #fff;
            font-size: 10px;
            font-weight: bold;
            pointer-events: none;
            /* テキストがマウスイベントを邪魔しないように */
        }

        /* コンプリートした都道府県（黄金グラデーション） */
        .map-pref.complete {
            fill: url(#goldGradient) !important;
            /* JavaScriptからこのグラデーションを指定します */
            filter: drop-shadow(0px 0px 8px rgba(255, 215, 0, 0.9));
            /* ★周りを金色に光らせる */
            stroke: #fff;
            /* 境界線を白にして輪郭をクッキリさせる */
            stroke-width: 1.5;
            z-index: 2;
            /* 手前に出す */
        }

        /* 既存の map-pref の hover を少し調整（コンプリート時は透過させない） */
        .map-pref:not(.complete):hover {
            opacity: 0.8;
        }

        .map-pref.complete:hover {
            filter: drop-shadow(0px 0px 15px rgba(255, 223, 0, 1));
            /* ホバーでさらに輝く */
        }

        /* 弾数のコンプリート要素にも光彩を適用 */
        .pref-item.complete,
        .region-container.complete {
            filter: drop-shadow(0px 0px 6px rgba(255, 215, 0, 0.6));
            border-color: rgba(255, 215, 0, 0.4) !important;
        }

        /* ★100%コンプリート時のデザインをCSSで完全に固定する */
        .bar-fill.gold-complete {
            background-color: #ffc107 !important;
            /* グラデーションが効かない時の保険（鮮やかな黄色） */
            background: linear-gradient(135deg, #ffe066 0%, #f5b041 50%, #b7791f 100%) !important;
            /* CSSネイティブの美しい金グラデーション */
            box-shadow: 0 0 8px rgba(245, 176, 65, 0.5);
        }
    </style>
</head>

    <div class="chart-header"
        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">

        <button id="resetFilterBtn" onclick="resetAllFilters()"
            style="display: none; background: #444; color: #fff; border: 1px solid #666; padding: 5px 12px; border-radius: 20px; font-size: 12px; cursor: pointer;">

            <b id="yearTotalCount">0</b>
        </div>

        </div>

    <div class="chart-container">
        <canvas id="historyChart" width="1200" height="300"></canvas>
    </div>



    <script>
        const userStats = JSON.parse(localStorage.getItem('manhole_collection')) || {};
        let monthPositions = []; // スクロール検知用

        let currentFilterPref = null; // nullなら全国、文字列（"東京都"など）ならその県のみ
        let currentFilterEdition = null; // nullなら全弾、文字列（"第1弾"など）ならその弾のみ

        function initChart() {
            const canvas = document.getElementById('historyChart');
            const ctx = canvas.getContext('2d');

            // --- 【修正】マスタデータをベースにした安全な集計ロジック ---
            const dataMap = {};
            const yearDataMap = {};
            let grandTotal = 0;
            let validDates = [];

            // 重複カウントを防ぐため、masterData（全カードマスタ）をベースに回す
            masterData.forEach(card => {
                const fullKey = `${card.city} (${card.id})`;
                // 正しいID付きキー、または古い市区町村名のみのキーのどちらかでデータを取得
                const stat = userStats[fullKey] || userStats[card.city];

                // 取得済みであり、かつ日付が入力されている場合のみカウント
                if (stat && stat.collected && stat.date) {

                    // 都道府県フィルタが有効な場合、一致しなければスキップ
                    if (currentFilterPref && card.pref !== currentFilterPref) {
                        return;
                    }

                    // ★【追加】弾数フィルタが有効な場合、一致しなければスキップ
                    if (currentFilterEdition && card.edition !== currentFilterEdition) {
                        return;
                    }

                    const monthKey = stat.date.substring(0, 7); // "YYYY-MM"
                    const yearKey = stat.date.substring(0, 4);  // "YYYY"

                    dataMap[monthKey] = (dataMap[monthKey] || 0) + 1;
                    yearDataMap[yearKey] = (yearDataMap[yearKey] || 0) + 1;
                    grandTotal++;
                    validDates.push(stat.date);
                }
            });

            if (validDates.length === 0) {
                // フィルタの結果、データが0になった時の表示
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#888";
                ctx.textAlign = "center";
                ctx.font = "14px sans-serif";

                // ★【修正】弾数フィルタにも対応したデータなしテキスト
                let noDataText = "記録がありません";
                if (currentFilterPref && currentFilterEdition) {
                    noDataText = `${currentFilterPref}の${currentFilterEdition}のデータはありません`;
                } else if (currentFilterPref) {
                    noDataText = `${currentFilterPref}のデータはありません`;
                } else if (currentFilterEdition) {
                    noDataText = `${currentFilterEdition}のデータはありません`;
                }

                ctx.fillText(noDataText, canvas.width / 2, canvas.height / 2);
                document.getElementById('totalCount').textContent = 0;
                document.getElementById('yearTotalCount').textContent = 0;
                document.getElementById('avgCount').textContent = "-";
                return;
            }

            // --- 月リストの作成 ---
            const sortedDates = validDates.sort();
            const firstDate = new Date(sortedDates[0]);
            const now = new Date();
            const months = [];
            let d = new Date(firstDate.getFullYear(), firstDate.getMonth(), 1);
            while (d <= now) {
                months.push(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`);
                d.setMonth(d.getMonth() + 1);
            }

            const counts = months.map(m => dataMap[m] || 0);
            const maxCount = Math.max(...counts, 1);

            // --- 統計表示の更新セクション ---
            const resetBtn = document.getElementById('resetFilterBtn');
            const avgBox = document.getElementById('avgCount').closest('.stat-box');
            const titleElem = document.getElementById('chartTitle');

            // ★【修正】都道府県、または弾数が選択されている場合の判定
            if (currentFilterPref || currentFilterEdition) {
                if (titleElem) {
                    if (currentFilterPref && currentFilterEdition) {
                        titleElem.textContent = `${currentFilterPref} (${currentFilterEdition}) の収集推移`;
                    } else {
                        titleElem.textContent = currentFilterPref ? `${currentFilterPref}の収集推移` : `${currentFilterEdition}の収集推移`;
                    }
                }
                if (resetBtn) resetBtn.style.display = "block";

                // 「月平均」のみ無効化（半透明）
                avgBox.style.opacity = "0.2";
                avgBox.style.pointerEvents = "none";
                document.getElementById('avgCount').textContent = "-";
            } else {
                // 【全国表示】
                if (titleElem) titleElem.textContent = "全国の収集推移";
                if (resetBtn) resetBtn.style.display = "none";

                // 「月平均」を通常表示に戻す
                avgBox.style.opacity = "1";
                avgBox.style.pointerEvents = "auto";
                const avg = months.length > 0 ? (grandTotal / months.length).toFixed(1) : 0;
                document.getElementById('avgCount').textContent = avg;
            }

            // 【常に更新】累計と表示中の年の合計
            document.getElementById('totalCount').textContent = grandTotal;
            const currentYear = document.getElementById('targetYearDisplay').textContent;
            document.getElementById('yearTotalCount').textContent = yearDataMap[currentYear] || 0;

            const barSpacing = 60;
            canvas.width = months.length * barSpacing + 120;

            const padding = 70;
            const chartW = canvas.width - padding * 2;
            const chartH = canvas.height - padding * 2;
            const stepX = chartW / months.length;
            const barW = stepX * 0.7;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            monthPositions = []; // リセット
            let lastYear = "";

            // --- 背景のグリッド（横線）を描画 ---
            ctx.save();
            ctx.strokeStyle = "rgba(255, 255, 255, 0.05)";
            ctx.lineWidth = 1;

            const gridStep = maxCount > 10 ? 5 : 2;

            for (let i = 0; i <= maxCount; i += gridStep) {
                const h = (i / maxCount) * chartH;
                const y = canvas.height - padding - h;

                ctx.beginPath();
                ctx.moveTo(padding - 20, y);
                ctx.lineTo(canvas.width - padding + 20, y);
                ctx.stroke();

                ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
                ctx.font = "10px sans-serif";
                ctx.textAlign = "right";
                ctx.fillText(i, padding - 25, y + 4);
            }
            ctx.restore();

            months.forEach((m, i) => {
                const year = m.split('-')[0];
                const x = padding + i * stepX;

                monthPositions.push({ x: x + barW / 2, year: year, fullMonth: m });

                // --- 背景の年別グラデーション描画 ---
                if (year !== lastYear) {
                    const monthsInYear = months.filter(mon => mon.startsWith(year)).length;
                    const bgWidth = monthsInYear * stepX;
                    const bgGrad = ctx.createLinearGradient(x, 0, x, canvas.height);

                    if (parseInt(year) % 2 === 0) {
                        bgGrad.addColorStop(0, 'rgba(77, 171, 255, 0.12)');
                        bgGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                    } else {
                        bgGrad.addColorStop(0, 'rgba(255, 255, 255, 0.05)');
                        bgGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                    }

                    ctx.fillStyle = bgGrad;
                    ctx.fillRect(x - (stepX - barW) / 2, 0, bgWidth, canvas.height);

                    ctx.fillStyle = "rgba(77, 171, 255, 0.8)";
                    ctx.font = 'bold 20px sans-serif';
                    ctx.textAlign = 'left';
                    ctx.fillText(year + '年', x, 35);

                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                    ctx.lineWidth = 1;
                    ctx.setLineDash([5, 5]);
                    ctx.beginPath();
                    ctx.moveTo(x - (stepX - barW) / 2, 45);
                    ctx.lineTo(x - (stepX - barW) / 2, canvas.height - 50);
                    ctx.stroke();
                    ctx.setLineDash([]);

                    lastYear = year;
                }

                // --- 軸ラベル（〇月）の描画 ---
                ctx.save();
                ctx.fillStyle = "#aaa";
                ctx.font = '11px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(parseInt(m.split('-')[1]) + '月', x + barW / 2, canvas.height - 40);
                ctx.restore();

                // --- 棒グラフと枚数の描画 ---
                const val = counts[i];
                const h = (val / maxCount) * chartH;
                const y = canvas.height - padding - h;

                if (val > 0) {
                    ctx.save();

                    const grad = ctx.createLinearGradient(0, y + h, 0, y);
                    // ★【修正】都道府県、または弾数フィルタがかかっているときは発光させる
                    if (currentFilterPref || currentFilterEdition) {
                        grad.addColorStop(0, '#2a82d2');
                        grad.addColorStop(1, '#81c7ff');
                        ctx.shadowColor = 'rgba(77, 171, 255, 0.8)';
                        ctx.shadowBlur = 15;
                    } else {
                        grad.addColorStop(0, '#333');
                        grad.addColorStop(1, '#4dabff');
                        ctx.shadowBlur = 0;
                    }

                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.roundRect(x, y, barW, h, [8, 8, 0, 0]);
                    ctx.fill();

                    ctx.shadowBlur = 0;
                    ctx.shadowColor = 'transparent';

                    ctx.fillStyle = "#ffffff";
                    ctx.font = 'bold 13px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(val, x + barW / 2, y - 12);

                    ctx.restore();
                } else {
                    ctx.fillStyle = "rgba(255, 255, 255, 0.05)";
                    ctx.beginPath();
                    ctx.roundRect(x, canvas.height - padding - 2, barW, 2, [1, 1, 0, 0]);
                    ctx.fill();
                }
            });

            // クリックイベント
            canvas.onclick = (e) => {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const clickX = (e.clientX - rect.left) * scaleX;
                const target = monthPositions.find(p => Math.abs(p.x - clickX) < 30);

                if (target) {
                    window.location.href = `calender.html?target=${target.fullMonth}`;
                }
            };

            // スクロールイベント
            const container = document.querySelector('.chart-container');
            container.onscroll = () => {
                const centerX = container.scrollLeft + (container.clientWidth / 2);
                const currentData = monthPositions.find(p => p.x > centerX) || monthPositions[monthPositions.length - 1];

                if (currentData) {
                    const y = currentData.year;
                    document.getElementById('targetYearDisplay').textContent = y;
                    document.getElementById('yearTotalCount').textContent = yearDataMap[y] || 0;
                }
            };

            // 初回スクロール（最新の年へ）
            if (!container.dataset.scrolled) {
                setTimeout(() => {
                    container.scrollLeft = container.scrollWidth;
                    const latestYear = months[months.length - 1].split('-')[0];
                    document.getElementById('targetYearDisplay').textContent = latestYear;
                    document.getElementById('yearTotalCount').textContent = yearDataMap[latestYear] || 0;
                    container.dataset.scrolled = "true";
                }, 150);
            }
        }

        function resetAllFilters() {
            // 1. 内部の状態管理変数を初期化
            currentFilterPref = null;
            currentFilterEdition = null;

            // 2. 都道府県と弾数の一覧UIから、選択中ハイライト（active-filterクラス）をすべて外す
            document.querySelectorAll('.pref-item').forEach(item => {
                item.classList.remove('active-filter');
            });

            // 3. グラフを全国・全弾のデータで再描画
            initChart();

            console.log("すべてのフィルタを解除しました");
        }

        // --- 1. 都道府県クリック時の関数 ---
        function selectPrefFromStats(prefName) {
            // 同じ県をもう一度タップしたら「全国」に戻す（トグル機能）
            if (currentFilterPref === prefName) {
                currentFilterPref = null;
                console.log("フィルタ解除: 全国を表示");
            } else {
                currentFilterPref = prefName;
                console.log("フィルタ適用:", prefName);
            }

            // グラフタイトルの更新（もしあれば）
            const titleElem = document.querySelector('h2'); // グラフの上のタイトル
            if (titleElem) {
                titleElem.textContent = currentFilterPref ? `${currentFilterPref}の収集推移` : "全国の収集推移";
            }

            // グラフを再描画
            initChart();

            const chartElement = document.querySelector('.chart-container');
            if (chartElement) {
                // 要素の場所を計算して、少し余白（20px）を持ってスクロール
                const offset = chartElement.getBoundingClientRect().top + window.pageYOffset - 20;
                window.scrollTo({
                    top: offset,
                    behavior: 'smooth'
                });
            }
        }

        window.onload = initChart;

        let masterData = [];
        // 初期ロード
        fetch('master_data.json').then(res => res.json()).then(data => {
            masterData = data;
            updatePrefStats();
            updateEditionStats();
        });

        // =========================================================
        // 【共通化】取得率に応じた進捗バーのスタイル判定
        // ポケモン仕様（緑・黄・赤）＋ 進捗に応じた濃淡（パターン1）
        // =========================================================
        function getGaugeStyle(collected, total, percent) {
            let itemStyle = '';
            let completeClass = '';

            if (collected === 0) {
                // 0枚：ダークグレー
                itemStyle = 'background-color: #333333 !important;';
            } else if (collected === total || percent === 100) {
                // 100%コンプリート：ゴールド
                completeClass = 'gold-complete';
            } else {
                let hslColor = '';

                if (percent >= 50) {
                    // 🟢 50%以上：緑（100%に近づくほど、鮮やかで深い緑になる）
                    const ratio = (percent - 50) / 50;            // 0.0 〜 1.0 の割合に変換
                    const saturation = Math.floor(55 + (ratio * 25)); // 55% 〜 80% (徐々に鮮やかに)
                    const lightness = Math.floor(50 - (ratio * 10));  // 50% 〜 40% (徐々に深く)
                    hslColor = `hsl(130, ${saturation}%, ${lightness}%)`;
                } else if (percent >= 20) {
                    // 🟡 20%以上50%未満：黄（50%に近づくほど鮮やかになる）
                    const ratio = (percent - 20) / 30;            // 0.0 〜 1.0 の割合に変換
                    const saturation = Math.floor(70 + (ratio * 30)); // 70% 〜 100%
                    hslColor = `hsl(48, ${saturation}%, 50%)`;
                } else {
                    // 🔴 20%未満：赤（0%に近づくほどくすんだ赤、20%に近づくほど鮮やかな赤）
                    const ratio = percent / 20;                   // 0.0 〜 1.0 の割合に変換
                    const saturation = Math.floor(55 + (ratio * 30)); // 55% 〜 85%
                    hslColor = `hsl(0, ${saturation}%, 53%)`;
                }

                itemStyle = `background-color: ${hslColor} !important;`;
            }

            return { itemStyle, completeClass };
        }
        // ==========================================
        // 2. 都道府県の統計UI更新
        // ==========================================
        function updatePrefStats() {
            const grid = document.getElementById('prefStatsGrid');
            if (!grid || masterData.length === 0) return;

            const regions = {
                "その他": ["世界", "その他"],
                "北海道・東北": ["北海道", "青森県", "岩手県", "宮城県", "秋田県", "山形県", "福島県"],
                "関東": ["茨城県", "栃木県", "群馬県", "埼玉県", "千葉県", "東京都", "神奈川県"],
                "中部": ["新潟県", "富山県", "石川県", "福井県", "山梨県", "長野県", "岐阜県", "静岡県", "愛知県"],
                "近畿": ["三重県", "滋賀県", "京都府", "大阪府", "兵庫県", "奈良県", "和歌山県"],
                "中国・四国": ["鳥取県", "島根県", "岡山県", "広島県", "山口県", "徳島県", "香川県", "愛媛県", "高知県"],
                "九州・沖縄": ["福岡県", "佐賀県", "長崎県", "熊本県", "大分県", "宮崎県", "鹿児島県", "沖縄県"]
            };

            const prefStats = {};
            masterData.forEach(card => {
                if (!prefStats[card.pref]) prefStats[card.pref] = { total: 0, collected: 0 };
                prefStats[card.pref].total++;
                const fullKey = `${card.city} (${card.id})`;
                if (userStats[fullKey]?.collected || userStats[card.city]?.collected) {
                    prefStats[card.pref].collected++;
                }
            });

            let html = '';

            for (const [regionName, prefs] of Object.entries(regions)) {
                let rTotal = 0;
                let rCollected = 0;
                let prefHtml = '';

                prefs.forEach(pref => {
                    const s = prefStats[pref];
                    if (!s) return;
                    rTotal += s.total;
                    rCollected += s.collected;

                    const percent = Math.floor((s.collected / s.total) * 100);

                    // ★共通関数で子要素のスタイル判定
                    const { itemStyle, completeClass } = getGaugeStyle(s.collected, s.total, percent);

                    const isActive = pref === currentFilterPref ? 'active-filter' : '';
                    prefHtml += `
            <div class="pref-item ${isActive}" onclick="selectPrefFromStats('${pref}')">
                <div class="pref-info"><span>${pref}</span><span>${s.collected}/${s.total}</span></div>
                <div class="bar-bg">
                    <div class="bar-fill ${completeClass}" style="width: ${percent}%; ${itemStyle}"></div>
                </div>
            </div>`;
                });

                if (rTotal === 0) rTotal = 1;
                const rPercent = Math.floor((rCollected / rTotal) * 100);

                // ★共通関数で地方（親ヘッダー）のスタイル判定
                const { itemStyle: regionStyle, completeClass: rCompleteClass } = getGaugeStyle(rCollected, rTotal, rPercent);

                const safeRegionId = regionName === "その他" ? "other" : regionName;

                html += `
        <div class="region-container" id="reg-${safeRegionId}">
            <div class="region-header" onclick="this.parentElement.classList.toggle('open')">
                <div class="region-info">
                    <div class="region-name-row">
                        <span class="arrow">▶</span> ${regionName}
                    </div>
                    <div class="region-percentage-row">
                        取得率: ${rPercent}% (${rCollected} / ${rTotal})
                    </div>
                </div>
                <div class="region-gauge-bg">
                    <div class="bar-fill ${rCompleteClass}" style="width: ${rPercent}%; ${regionStyle}"></div>
                </div>
            </div>
            <div class="region-content">${prefHtml}</div>
        </div>`;
            }

            grid.innerHTML = html;

            // 古い星マークが残らないよう、まず一度すべて削除する
            document.querySelectorAll('.map-star-icon').forEach(el => el.remove());

            masterData.forEach(card => {
                if (card.pref === "世界" || card.pref === "other" || card.pref === "その他") return;
                const s = prefStats[card.pref];
                if (!s) return;
                const mapEl = document.getElementById(`map-${card.pref}`);
                if (mapEl) {
                    const percent = Math.floor((s.collected / s.total) * 100);

                    // 1. 地図の塗りつぶし色判定（ポケモンHPバー風）
                    if (s.collected === 0) {
                        mapEl.style.fill = "#333333";
                    } else if (s.collected === s.total) {
                        mapEl.style.fill = "url(#goldGradient)";
                    } else {
                        if (percent >= 50) {
                            const ratio = (percent - 50) / 50;
                            const saturation = Math.floor(55 + (ratio * 25));
                            const lightness = Math.floor(50 - (ratio * 10));
                            mapEl.style.fill = `hsl(130, ${saturation}%, ${lightness}%)`;
                        } else if (percent >= 20) {
                            const ratio = (percent - 20) / 30;
                            const saturation = Math.floor(70 + (ratio * 30));
                            mapEl.style.fill = `hsl(48, ${saturation}%, 50%)`;
                        } else {
                            const ratio = percent / 20;
                            const saturation = Math.floor(55 + (ratio * 30));
                            mapEl.style.fill = `hsl(0, ${saturation}%, 53%)`;
                        }
                    }

                    // 2. ★【追加】100%コンプリート時の星マーク生成ロジック
                    if (s.collected === s.total && s.total > 0) {
                        // 都道府県の要素の位置とサイズ（バウンディングボックス）を取得
                        const bbox = mapEl.getBBox();

                        // 四角形の中心点を計算
                        const centerX = bbox.x + bbox.width / 2;
                        const centerY = bbox.y + bbox.height / 2;

                        // SVGのテキスト要素として星マーク（★）を作成
                        const star = document.createElementNS("http://www.w3.org/2000/svg", "text");
                        star.setAttribute("class", "map-star-icon");
                        star.setAttribute("x", centerX);
                        // テキストの基準点が下部にあるため、少しだけ下にずらす（+4〜+5px程度が綺麗に中央にハマります）
                        star.setAttribute("y", centerY + 4);
                        star.setAttribute("text-anchor", "middle"); // 横方向の中央揃え
                        star.textContent = "★";

                        // ゴールドの地図上で目立つようにスタイルを設定（白ベースにゴールドの影など）
                        star.style.cssText = `
                    font-size: 12px;
                    font-weight: bold;
                   fill: red; 
                   stroke: #000;
                    stroke-width: 0.5px;
                    pointer-events: none; /* 星マークが邪魔で都道府県がクリックできなくなるのを防ぐ */
                `;

                        // 地図SVG要素（mapElの親要素など）に星を追加
                        mapEl.parentElement.appendChild(star);
                    }
                }
            });
        }

        // ==========================================
        // 3. 弾数の統計UI更新
        // ==========================================
        function updateEditionStats() {
            const grid = document.getElementById('editionStatsGrid');
            if (!grid || masterData.length === 0) return;

            const edStats = {};
            let maxEdNum = 0;

            masterData.forEach(card => {
                const edNum = parseInt(card.edition.replace(/[^0-9]/g, ''));
                if (isNaN(edNum)) return;
                if (edNum > maxEdNum) maxEdNum = edNum;

                const edStr = card.edition;
                if (!edStats[edStr]) {
                    edStats[edStr] = { total: 0, collected: 0, num: edNum };
                }
                edStats[edStr].total++;
                if (userStats[card.city]?.collected) {
                    edStats[edStr].collected++;
                }
            });

            const sortedEditions = Object.keys(edStats).sort((a, b) => edStats[a].num - edStats[b].num);

            const groups = {};
            sortedEditions.forEach(edStr => {
                const num = edStats[edStr].num;
                const groupIndex = Math.floor((num - 1) / 5);
                const start = groupIndex * 5 + 1;
                let end = (groupIndex + 1) * 5;
                if (end > maxEdNum) end = maxEdNum;

                const groupName = start === end ? `第${start}弾` : `第${start}弾 〜 第${end}弾`;
                if (!groups[groupName]) groups[groupName] = [];
                groups[groupName].push(edStr);
            });

            let html = '';

            Object.keys(groups).sort((a, b) => {
                return parseInt(a.replace(/[^0-9]/g, '')) - parseInt(b.replace(/[^0-9]/g, ''));
            }).forEach(groupName => {
                const eds = groups[groupName];
                let gTotal = 0;
                let gCollected = 0;
                let edHtml = '';

                eds.forEach(edStr => {
                    const s = edStats[edStr];
                    gTotal += s.total;
                    gCollected += s.collected;
                    const percent = Math.floor((s.collected / s.total) * 100);

                    // ★共通関数で弾数子要素のスタイル判定
                    const { itemStyle: edItemStyle, completeClass } = getGaugeStyle(s.collected, s.total, percent);

                    // ★【修正】現在選択中の弾数なら active-filter クラスを付与
                    const isActive = (edStr === currentFilterEdition) ? 'active-filter' : '';

                    edHtml += `
            <div class="pref-item ${isActive}" onclick="selectEditionFromStats('${edStr}')" style="cursor: pointer;">
                <div class="pref-info"><span>${edStr}</span><span>${s.collected}/${s.total}</span></div>
                <div class="bar-bg">
                    <div class="bar-fill ${completeClass}" style="width: ${percent}%; ${edItemStyle}"></div>
                </div>
            </div>`;
                });

                if (gTotal === 0) gTotal = 1;
                const gPercent = Math.floor((gCollected / gTotal) * 100);

                // ★共通関数で弾数親グループのスタイル判定
                const { itemStyle: edGroupStyle, completeClass: gCompleteClass } = getGaugeStyle(gCollected, gTotal, gPercent);

                html += `
        <div class="region-container" id="ed-group-${groupName}">
            <div class="region-header" onclick="this.parentElement.classList.toggle('open')">
                <div class="region-info">
                    <div class="region-name-row">
                        <span class="arrow">▶</span> ${groupName}
                    </div>
                    <div class="region-percentage-row">
                        取得率: ${gPercent}% (${gCollected} / ${gTotal})
                    </div>
                </div>
                <div class="region-gauge-bg">
                    <div class="bar-fill ${gCompleteClass}" style="width: ${gPercent}%; ${edGroupStyle}"></div>
                </div>
            </div>
            <div class="region-content">${edHtml}</div>
        </div>`;
            });

            grid.innerHTML = html;
        }
        // 統計から弾数をタップした時のフィルタ連動（グラフ絞り込み＆トグル＆スクロール）
        function selectEditionFromStats(edStr) {
            // 同じ弾数をもう一度タップしたら「全弾」に戻す（トグル機能）
            if (currentFilterEdition === edStr) {
                currentFilterEdition = null;
                console.log("フィルタ解除: 全弾を表示");
            } else {
                currentFilterEdition = edStr;
                console.log("フィルタ適用:", edStr);
            }

            // グラフタイトルの更新（都道府県の選択状態も考慮）
            const titleElem = document.getElementById('chartTitle') || document.querySelector('h2');
            if (titleElem) {
                if (currentFilterPref && currentFilterEdition) {
                    titleElem.textContent = `${currentFilterPref} (${currentFilterEdition}) の収集推移`;
                } else if (currentFilterPref) {
                    titleElem.textContent = `${currentFilterPref}の収集推移`;
                } else if (currentFilterEdition) {
                    titleElem.textContent = `${currentFilterEdition}の収集推移`;
                } else {
                    titleElem.textContent = "全国の収集推移";
                }
            }

            // 弾数UI側のアクティブクラス（選択中ハイライト）の切り替え
            document.querySelectorAll('#editionStatsGrid .pref-item').forEach(item => {
                const itemText = item.querySelector('.pref-info span')?.textContent;
                if (itemText === currentFilterEdition) {
                    item.classList.add('active-filter');
                } else {
                    item.classList.remove('active-filter');
                }
            });

            // グラフを再描画
            initChart();

            // グラフコンテナの位置までスムーズスクロール
            const chartElement = document.querySelector('.chart-container');
            if (chartElement) {
                const offset = chartElement.getBoundingClientRect().top + window.pageYOffset - 20;
                window.scrollTo({
                    top: offset,
                    behavior: 'smooth'
                });
            }
        }

    </script>
